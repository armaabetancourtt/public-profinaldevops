version: '3.8'

services:
  # ── Backend Público ──────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: publico-vuelos-backend
    restart: unless-stopped

    environment:
      PORT: 3000
      MONGO_URI: mongodb://10.0.2.157:27017/vuelos
      NODE_ENV: production

    ports:
      - "3000:3000"

    volumes:
      - public_logs:/app/logs

    networks:
      - vuelos-net

  # ── Frontend Público ─────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: publico-vuelos-frontend
    restart: unless-stopped

    environment:
      REACT_APP_API_URL: http://44.196.169.146:3000

    ports:
      - "8080:80"

    depends_on:
      - backend

    networks:
      - vuelos-net

volumes:
  public_logs:

networks:
  vuelos-net:
    driver: bridge